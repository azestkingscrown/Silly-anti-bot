<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Anti-Ad Admin Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        nav {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(30, 58, 138, 0.5);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 600;
            color: #60a5fa;
        }

        nav a {
            color: #60a5fa;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        nav a:hover {
            color: #93c5fd;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #60a5fa;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            transform: translateY(-2px);
        }

        .card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(30, 58, 138, 0.5);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #6ee7b7;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(30, 58, 138, 0.5);
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            font-size: 20px;
            color: #60a5fa;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            background: rgba(30, 58, 138, 0.3);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            background: rgba(30, 58, 138, 0.5);
            border-color: #60a5fa;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-submit {
            background: #3b82f6;
            color: white;
        }

        .btn-submit:hover {
            background: #2563eb;
        }

        .btn-cancel {
            background: #475569;
            color: white;
        }

        .btn-cancel:hover {
            background: #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        thead {
            background: rgba(30, 58, 138, 0.3);
        }

        th {
            padding: 12px;
            text-align: left;
            color: #60a5fa;
            font-weight: 600;
            border-bottom: 1px solid rgba(30, 58, 138, 0.5);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(30, 58, 138, 0.3);
            color: #cbd5e1;
        }

        tr:hover {
            background: rgba(30, 58, 138, 0.2);
        }

        .badge {
            background: #3b82f6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.owner {
            background: #f59e0b;
        }

        .badge.dev {
            background: #8b5cf6;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
        }

        .btn-sm:hover {
            background: #2563eb;
        }

        .btn-sm.delete {
            background: #ef4444;
        }

        .btn-sm.delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
        }

        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }

        .close-modal:hover {
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">Anti-Ad Bot - Admin Portal: User Management</div>
        <div>
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <div>
                <h1>User Management</h1>
                <p style="color: #94a3b8; margin-top: 5px;">Manage bot administrators and developers</p>
            </div>
            <button class="btn-primary" onclick="openAddUserModal()">Add User</button>
        </div>

        <div id="messageContainer"></div>

        <div class="card">
            <h2 style="color: #60a5fa; margin-bottom: 15px;">Users</h2>
            <div id="usersTable" class="loading">Loading users...</div>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close-modal" onclick="closeUserModal()">&times;</span>
                <span id="modalTitle">Add New User</span>
            </div>
            <form id="userForm" onsubmit="saveUser(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <small style="color: #94a3b8;">Leave blank to keep current password when editing</small>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option value="user">User (Can upload training data)</option>
                        <option value="dev">Dev (Can manage users & config)</option>
                        <option value="owner">Owner (Full access)</option>
                    </select>
                </div>

                <div class="modal-buttons">
                    <button type="submit" class="btn-submit">Save User</button>
                    <button type="button" class="btn-cancel" onclick="closeUserModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openAddUserModal() {
            document.getElementById('modalTitle').textContent = 'Add New User';
            document.getElementById('userForm').reset();
            document.getElementById('username').disabled = false;
            document.getElementById('password').required = true;
            document.getElementById('userModal').classList.add('active');
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function loadUsers() {
            fetch('/api/users')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('usersTable');

                    if (!data.users || data.users.length === 0) {
                        container.innerHTML = '<div class="empty-state">No users found</div>';
                        return;
                    }

                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Role</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.users.forEach(user => {
                        const roleClass = user.role === 'owner' ? 'owner' : (user.role === 'dev' ? 'dev' : '');
                        const created = new Date(user.created).toLocaleDateString();

                        html += `
                            <tr>
                                <td>${user.username}</td>
                                <td><span class="badge ${roleClass}">${user.role}</span></td>
                                <td>${created}</td>
                                <td>
                                    <div class="actions">
                                        ${user.username !== 'owner' ? `<button class="btn-sm delete" onclick="deleteUser('${user.username}')">Delete</button>` : ''}
                                    </div>
                                </td>
                            </tr>
                        `;
                    });

                    html += `
                            </tbody>
                        </table>
                    `;

                    container.innerHTML = html;
                })
                .catch(err => {
                    console.error('Error loading users:', err);
                    document.getElementById('usersTable').innerHTML = '<div class="empty-state">Error loading users</div>';
                });
        }

        function saveUser(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const data = {
                username: username,
                role: role
            };

            if (password) {
                data.password = password;
            }

            fetch('/api/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    showMessage('success', result.message);
                    closeUserModal();
                    loadUsers();
                } else {
                    showMessage('error', result.error || 'Error creating user');
                }
            })
            .catch(err => showMessage('error', 'Error: ' + err.message));
        }

        function deleteUser(username) {
            if (!confirm(`Are you sure you want to delete user "${username}"?`)) return;

            fetch(`/api/users/${username}`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('success', data.message);
                    loadUsers();
                } else {
                    showMessage('error', data.error || 'Error deleting user');
                }
            })
            .catch(err => showMessage('error', 'Error: ' + err.message));
        }

        function showMessage(type, text) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 5000);
        }

        // Close modal on background click
        document.getElementById('userModal').addEventListener('click', (e) => {
            if (e.target.id === 'userModal') {
                closeUserModal();
            }
        });

        // Load users on page load
        loadUsers();
    </script>
</body>
</html>
